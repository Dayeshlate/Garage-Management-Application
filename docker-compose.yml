services:
  db:
    image: mysql:8.4
    container_name: garage-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: garage_management
      MYSQL_USER: garage
      MYSQL_PASSWORD: garage123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: garage-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./Garage-Management-Application:/app
      - maven_cache:/root/.m2
    command: mvn spring-boot:run
    environment:
      DATABASE_URL: "jdbc:mysql://db:3306/garage_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      DATABASE_USERNAME: garage
      DATABASE_PASSWORD: garage123
      FRONTEND_URL: "http://localhost:3000"
      JWT_SECRET: ChangeThisJwtSecretToAtLeast32CharactersLongForHS256123
      EMAIL_USERNAME: ""
      EMAIL_PASSWORD: ""
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Garage-Management-frontend
      args:
        VITE_API_URL: "http://localhost:8080"
        VITE_DEFAULT_CURRENCY: USD
    container_name: garage-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  maven_cache: