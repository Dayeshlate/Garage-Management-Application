spring.application.name=Garage-Management-Application

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/garagedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate - FIXED DIALECT
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Server port
server.port=8080

billing.tax=8
billing.discount=0.00



