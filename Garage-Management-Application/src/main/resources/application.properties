spring.application.name=Garage-Management-Application
spring.config.import=file:.env[.properties]

# # MySQL Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Server port
server.port=8080

# JWT configuration
jwt.secret=${JWT_SECRET:ChangeThisJwtSecretToAtLeast32CharactersLongForHS256123}
jwt.token-validity-ms=86400000

# Billing configuration
billing.tax=0.08
billing.discount=0.00

# Email configuration
frontend_url=${FRONTEND_URL}
spring.mail.properties.mail.smtp.from=${EMAIL_USERNAME}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

